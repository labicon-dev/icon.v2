name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm run lint

      - name: Check formatting (Prettier)
        run: pnpm run format:check

      - name: Build
        run: pnpm run build
        env:
          # A URL base é secreta (ver ICO-9). Defina em Settings > Secrets and
          # variables > Actions > New repository secret: VITE_API_BASE_URL.
          # Sem o secret, o validador de boot falha o build de propósito.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
