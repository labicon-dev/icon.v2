name: PR Title

# Valida que o título do PR segue Conventional Commits — o mesmo padrão que o
# commitlint exige nas mensagens de commit (commitlint.config.js).

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validar título (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Checa o título do PR
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Tipos alinhados ao @commitlint/config-conventional
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            O assunto "{subject}" deve começar em minúscula e no imperativo
            (ex.: "adiciona validação", não "Adiciona validação").
